{include file="public/header"/}
<link rel="stylesheet" href="/static/agent/css/login.css">
<body class="login-bg">

<div class="login layui-anim layui-anim-up">
    <div class="message">代理登录</div>
    <div id="darkbannerwrap"></div>
    <form method="post" action="" class="layui-form" >
        <input name="username" placeholder="用户名"  type="text" lay-verify="required" class="layui-input" autocomplete="off">
        <hr class="hr15">
        <input name="password" placeholder="密码" lay-verify="required"  type="password" class="layui-input">
        <hr class="hr15">
        <input value="登录" lay-submit lay-filter="login" style="width:100%;" type="submit">
        <hr class="hr20" >
    </form>
</div>
<!-- 底部结束 -->
</body>
</html>
