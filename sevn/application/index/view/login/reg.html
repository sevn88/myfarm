    .van-field__control {
    display: block;
    box-sizing: border-box;
    width: 100%;
    min-width: 0;
    margin: 0;
    padding: 0;
    color: var(--van-field-input-text-color);
    line-height: inherit;
    text-align: left;
    background-color: #ffffff;
    border: 0;
    resize: none;
    -webkit-user-select: auto;
    user-select: auto
}

.van-field__control::-webkit-input-placeholder {
    color: var(--van-field-placeholder-text-color)
}

.van-field__control::placeholder {
    color: var(--van-field-placeholder-text-color)
}

.van-field__control:disabled {
    color: var(--van-field-input-disabled-text-color);
    cursor: not-allowed;
    opacity: 1;
    -webkit-text-fill-color: var(--van-field-input-disabled-text-color)
}

.van-field__control:read-only {
    cursor: default
}

.van-field__control--center {
    justify-content: center;
    text-align: center
}

.van-field__control--right {
    justify-content: flex-end;
    text-align: right
}

.van-field__control--custom {
    display: flex;
    align-items: center;
    min-height: var(--van-cell-line-height)
}

.van-field__control--error::-webkit-input-placeholder {
    color: var(--van-field-input-error-text-color);
    -webkit-text-fill-color: currentColor
}

.van-field__control--error,.van-field__control--error::placeholder {
    color: var(--van-field-input-error-text-color);
    -webkit-text-fill-color: currentColor
}

.van-field__control--min-height {
    min-height: var(--van-field-text-area-min-height)
}

.van-field__control[type=date],.van-field__control[type=time],.van-field__control[type=datetime-local] {
    min-height: var(--van-cell-line-height)
}

.van-field__control[type=search] {

<uni-app class="uni-app--maxwidth">
    <uni-page data-page="pages/regist/index">

        <uni-page-wrapper>
            <uni-page-body>
                <div class="container1">

                    <div class="title" style="text-align:center;">{:lang('welcome1')}</div>
                    <div class="wrap">
                        <div class="evan-form-container items" style="margin-top:20vw;">
<!--main start-->

    <img class="mm-image" src="/static/index/login/account-green.png">

    </span>

            </div>
        </div>
    </div>
</div>
<div class="mm-container">

        {:lang('phone1')}

    </span>
    <div class="van-cell van-field">
        <div class="van-cell__value van-cell__value--alone van-field__value">
            <div class="van-field__body">
                
                <input type=""  name="phone"  class="mm-div"  onchange="check_phone()" maxlength="11" enterkeyhint="done" autocomplete="off" placeholder="{:lang('enterphonenumber1')}">

            <div class="van-field__body">
                <input type="password" pattern="[0-9]{6}" maxlength="6" name="payment" step="" enterkeyhint="done" autocomplete="off" oninput="validateNumber(this)"   class="mm-div" placeholder="{:lang('input6number1')}">

<script src="/static/jquery.cookie.js"></script>

<script>
    $(function () {
        if ($.cookie("captcha")) {
            var count = $.cookie("captcha");
            $('#Send').text("(" + count + ")S").attr('disabled', true);
            var resend = setInterval(function () {
                count--;
                if (count > 0) {
                    $('#Send').text("(" + count + ")S").attr('disabled', true);
                    $.cookie("captcha", count, {path: '/', expires: (1 / 86400) * count});
                } else {
                    clearInterval(resend);
                    $('#Send').text("Send").addClass("active");
                }
            }, 1000);
        }

        $(document).on("click", ".active", function () {
            var phone = $("input[ name='phone']").val();
            var type = 1;
            if (phone && type){
                layer.load(2);
                $.ajax({
                    url: "{:Url('sms_code')}",
                    type: "post",
                    traditional: true,
                    data: {phone:phone,type:type},
                    success: function (e) {
                        layer.closeAll('loading');
                        if (e.code === 1) {
                            layer.msg(e.msg);
                            var btn = $(this);
                            var count = 10;
                            var resend = setInterval(function () {
                                count--;
                                if (count > 0) {
                                    $('#Send').text("(" + count + ")S").attr('disabled', true);
                                    $('#Send').removeClass("active");
                                    $.cookie("captcha", count, {path: '/', expires: (1 / 86400) * count});
                                } else {
                                    clearInterval(resend);
                                    $('#Send').text("Send").addClass("active");
                                }
                            }, 1000);
                            btn.attr('disabled', true).css('cursor', 'not-allowed');
                        } else {
                            layer.msg(e.msg, function () {
                                return false;
                            });
                        }
                    },
                });
            }else {
                layer.msg('{:lang("mobilecannotbeempty1")}}', function(){
                });
            }
        });
    });
</script>

<script>
    function check_username() {
        var username = $("input[ name='username']").val();
        layer.load(2);
        $.ajax({
            url: "{:Url('check_username')}",
            type: "post",
            traditional: true,
            data: {username: username},
            success: function (e) {
                layer.closeAll('loading');
                if (e.code === 0){
                    layer.msg(e.msg, function(){
                        $("input[ name='username']").val('');
                    });
                }
            },
        });
    }

    function validateNumber(input) {
            // 使用正则表达式检查输入是否为数字
            input.value = input.value.replace(/[^0-9]/g, '');

            // 如果需要限制最大长度，可以在这里添加逻辑
            // 例如，如果要限制最大长度为6：
            // if (input.value.length > 6) {
            //     input.value = input.value.slice(0, 6);
            // }
        }
    function check_phone() {
        var phone = $("input[ name='phone']").val();
        layer.load(2);
        $.ajax({
            url: "{:Url('check_phone')}",
            type: "post",
            traditional: true,
            data: {phone: phone},
            success: function (e) {
                layer.closeAll('loading');
                if (e.code === 0){
                    layer.msg(e.msg, function(){
                        $("input[ name='phone']").val('');
                    });
                }else {
                    $("#Send").addClass("active");
                }
            },
        });
    }
</script>

<script>
function isNumeric(str) {
  var re = /^[0-9]+$/;
  return re.test(str);
}
    $(document).on("click", ".reg", function () {
        var username = $("input[ name='username']").val();
        var phone = $("input[ name='phone']").val();
        var code = $("input[ name='code']").val();
        var password = $("input[ name='password']").val();
        var payment = $("input[ name='payment']").val();
        if (payment.length!=6 || !isNumeric(payment)){
            layer.msg("{:lang('enter6correctpassword1')}",{time:3000,end:function(){return false}})
            return false
        }
        var invite_code = $("input[ name='invite_code']").val();
            layer.load(2);
            $.ajax({
                url: "{:Url('reg')}",
                type: "post",
                traditional: true,
                data: {username: username, phone: phone, code:code,password: password,payment:payment,invite_code:invite_code},
                success: function (e) {
                    layer.closeAll('loading');
                    if (e.code === 1) {
                        layer.msg(e.msg, {
                            time: 2000,
                            end: function () {
                                window.location.href = "{:Url('login/index')}";
                            }
                        });
                    } else {
                        layer.msg(e.msg, function () {
                            return false;
                        });
                    }
                },
            });
    });
</script>
