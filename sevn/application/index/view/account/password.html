      <!---->

<script src="/static/jquery.cookie.js"></script>

<script>
  $(function () {
    if ($.cookie("captcha")) {
      var count = $.cookie("captcha");
      $('#Send').text("(" + count + ")S").removeClass("active");
      var resend = setInterval(function () {
        count--;
        if (count > 0) {
          $('#Send').text("(" + count + ")S").removeClass("active");
          $.cookie("captcha", count, {path: '/', expires: (1 / 86400) * count});
        } else {
          clearInterval(resend);
          $('#Send').text("Send").addClass("active");
        }
      }, 1000);
    }

    $(document).on("click", ".active", function () {
      var type = 2;
      if (type){
        layer.load(2);
        $.ajax({
          url: "{:Url('sms_code')}",
          type: "post",
          traditional: true,
          data: {type:type},
          success: function (e) {
            layer.closeAll('loading');
            if (e.code === 1) {
              layer.msg(e.msg);
              var btn = $(this);
              var count = 10;
              var resend = setInterval(function () {
                count--;
                if (count > 0) {
                  $('#Send').text("(" + count + ")S").attr('disabled', true);
                  $('#Send').removeClass("active");
                  $.cookie("captcha", count, {path: '/', expires: (1 / 86400) * count});
                } else {
                  clearInterval(resend);
                  $('#Send').text("Send").addClass("active");
                }
              }, 1000);
              btn.attr('disabled', true).css('cursor', 'not-allowed');
            } else {
              layer.msg(e.msg, function () {
                return false;
              });
            }
          },
        });
      }else {
        layer.msg('{:lang("mobilecannotbeempty1")}', function(){
        });
      }
    });
  });
</script>

<script>
  $(document).on("click", ".save", function () {
    var o_pass = $("input[ name='o_pass']").val();
    var n_pass = $("input[ name='n_pass']").val();
    var c_pass = $("input[ name='c_pass']").val();
    if (n_pass !== c_pass){
      layer.msg('{:lang("TwoPasswordsAreInconsistent")}', function () {
        return false;
      });
    }else {
      layer.load(2);
      $.ajax({
        url: "{:Url('password')}",
        type: "post",
        traditional: true,
        data: {o_pass:o_pass,n_pass: n_pass,c_pass:c_pass},
        success: function (e) {
          layer.closeAll('loading');
          if (e.code === 1) {
            layer.msg(e.msg, {
              time: 2000,
              end: function () {
                location.reload();
              }
            });
          } else {
            layer.msg(e.msg, function () {
              return false;
            });
          }
        },
      });
    }

  });
</script>
