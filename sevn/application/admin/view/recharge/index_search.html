
<fieldset>
    <legend>条件搜索</legend>
    <form class="layui-form layui-form-pane form-search" action="{:request()->url()}" onsubmit="return false" method="get" autocomplete="off">
        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">用户名称</label>
            <div class="layui-input-inline">
                <input name="keyword" value="{$Think.get.keyword|default=''}" placeholder="请输入用户名称" class="layui-input">
            </div>
        </div>
         <div class="layui-form-item layui-inline">
            <label class="layui-form-label">订单号</label>
            <div class="layui-input-inline">
                <input name="order_no" value="{$Think.get.order_no|default=''}" placeholder="请输入订单号" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">用户ID</label>
            <div class="layui-input-inline">
                <input name="userid" value="{$Think.get.userid|default=''}" placeholder="请输入用户ID" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">用户电话</label>
            <div class="layui-input-inline">
                <input name="usertel" value="{$Think.get.usertel|default=''}" placeholder="请输入用户电话" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-inline">
                <select name="cid" id="selectList">
                    <option value="99">状态选择</option>
                    {foreach $recharge_type as $key=>$vo}
                    <option value="{$vo.status_value}">{$vo.name}</option>
                    {/foreach}
                </select>
            </div>
        </div>
        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">By 代理</label>
            <div class="layui-input-inline">
                <input name="agentname" value="{$Think.get.agentname|default=''}" placeholder="请输入代理名称" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <button class="layui-btn layui-btn-primary"><i class="layui-icon">&#xe615;</i> 搜 索</button>
        </div>

        &nbsp;
        &nbsp;
        &nbsp;
        {present name="sum"}
        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">合计</label>
            <div class="layui-input-inline">
                <input value="{$sum}" class="layui-input" readOnly="true">
            </div>
        </div>
        {/present}
    </form>
</fieldset>

<script>
    var test = "{$Think.get.cid|default='99'}";
    $("#selectList").find("option[value="+test+"]").prop("selected",true);
    form.render()
</script>
