
<fieldset>
    <legend>条件搜索</legend>
    <form class="layui-form layui-form-pane form-search" action="{:request()->url()}" onsubmit="return false" method="get" autocomplete="off">
        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">用户名称</label>
            <div class="layui-input-inline">
                <input name="keyword" value="{$Think.get.keyword|default=''}" placeholder="请输入用户名称" class="layui-input">
            </div>


        </div>
        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">用户电话</label>
            <div class="layui-input-inline">
                <input name="usertel" value="{$Think.get.usertel|default=''}" placeholder="请输入用户电话" class="layui-input">
            </div>
        </div>


        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">用户ID</label>
            <div class="layui-input-inline">
                <input name="userid" value="{$Think.get.userid|default=''}" placeholder="请输入用户ID" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">注册IP</label>
            <div class="layui-input-inline">
                <input name="userip" value="{$Think.get.userip|default=''}" placeholder="请输入用户注册的IP" class="layui-input">
            </div>
        </div>
        
        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">邀请码</label>
            <div class="layui-input-inline">
                <input name="invitecode" value="{$Think.get.invitecode|default=''}" placeholder="请输入用户的邀请码" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <button class="layui-btn layui-btn-primary"><i class="layui-icon">&#xe615;</i> 搜 索</button>
        </div>


    </form>
</fieldset>

<script>
    var test = "{$Think.get.is_jia|default='0'}";
    $("#selectList").find("option[value="+test+"]").prop("selected",true);
    form.render()
</script>
