{extend name='main'}

{block name="content"}


<body class="page-no-scroll">
<link rel="stylesheet" href="__ROOT__/static/layui/css/layui.css">
<!--<link rel="stylesheet" href="__ROOT__/static/demo.css">-->

<div class="page-wrapper">
    <fieldset class="layui-elem-field layui-field-title">
        <legend>树形结构</legend>
    </fieldset>
    <div class="layui-btn-container" style="display: inline-block;">
        <button id="btnExpandAll" class="layui-btn layui-btn-sm layui-btn-primary">
            <i class="layui-icon">&#xe668;</i>展开全部
        </button>
        <button id="btnFoldAll" class="layui-btn layui-btn-sm layui-btn-primary">
            <i class="layui-icon">&#xe66b;</i>折叠全部
        </button>


    </div>
    <input class="layui-input" id="edtSearch" value="" placeholder="输入关键字"
           style="display: inline-block;width: 140px;height: 30px;line-height: 30px;padding: 0 5px;margin-right: 5px;"/>
    <div class="layui-btn-container" style="display: inline-block;">
        <button id="btnSearch" class="layui-btn layui-btn-sm layui-btn-primary">
            <i class="layui-icon">&#xe615;</i>搜索
        </button>
        <button id="btnClearSearch" class="layui-btn layui-btn-sm layui-btn-primary">
            <i class="layui-icon">&#x1006;</i>清除搜索
        </button>
    </div>


    <table id="demoTreeTable1"></table>
    <input type="hidden" id="userList" value="{$list}">
</div>


<!-- 表格操作列 -->
<script type="text/html" id="demoTreeTableBar1">
    <div style="display:none">
        <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="edit">修改</a>
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
    </div>
</script>


<!-- 表格状态列 -->
<script type="text/html" id="demoTreeTableState1">
    <input type="checkbox" lay-filter="ckState" value="{{d.id}}" lay-skin="switch"
           lay-text="正常|锁定" {{d.state==0?'checked':''}}/>
</script>

<div class="page-loading">
    <div class="ball-loader sm">
        <span></span><span></span><span></span><span></span>
    </div>
</div>

<script src="__ROOT__/static/layui/layui.js"></script>
<script>


    setTimeout(function(){
        console.log(JSON.parse($('#userList').val()))

        layui.config({
            base: '__ROOT__/static/'
        }).extend({
            treeTable: 'treeTable/treeTable'
        }).use(['layer', 'util', 'treeTable'], function () {
            var $ = layui.jquery;
            var layer = layui.layer;
            var util = layui.util;
            var treeTable = layui.treeTable;
            console.log("treeTable", treeTable)
            var data =JSON.parse($('#userList').val())

            // 渲染表格
            var insTb = treeTable.render({
                elem: '#demoTreeTable1',
                data: data,
                tree: {
                    iconIndex: 2
                },
                cols: [
                    {type: 'numbers'},
                    {type: 'checkbox'},
                    {field: 'username', title: 'username'},
                    {field: 'phone', title: 'phone', width: 160},
                    {field: 'balance', title: 'balance', width: 160},
                    {
                        field: 'create_time', title: '创建时间', width: 180,templet:function(d){
                            if (d.create_time){
                                return timestampToTime(d.create_time)
                            }else
                            {
                                return ""
                            }

                        }
                    },


                ],
                style: 'margin-top:0;'
            });



            // 全部展开
            $('#btnExpandAll').click(function () {
                insTb.expandAll();
            });

            // 全部折叠
            $('#btnFoldAll').click(function () {
                insTb.foldAll();
            });




            $('#btnChecked').click(function () {
                insTb.expand('1_1_2');
                insTb.setChecked(['1_1_2']);
            });

            $('#btnSearch').click(function () {
                var keywords = $('#edtSearch').val();
                if (keywords) {
                    insTb.filterData(keywords);
                } else {
                    insTb.clearFilter();
                }
            });

            $('#btnClearSearch').click(function () {
                insTb.clearFilter();
            });

            $(document).on('mouseenter', '*[lay-tips]', function () {
                layer.tips($(this).attr('lay-tips'), this, {tips: [1, '#FF5722'], time: -1});
            }).on('mouseleave', '*[lay-tips]', function () {
                layer.closeAll('tips');
            });

            setTimeout(function () {
                $('body').children('.page-loading').hide();
                $('body').removeClass('page-no-scroll');
            }, 150);


        });
    },1000)


    function timestampToTime(timestamp) {
        var date = new Date(timestamp * 1000);//时间戳为10位需*1000，时间戳为13位的话不需乘1000
        var Y = date.getFullYear() + '-';
        var M = (date.getMonth()+1 < 10 ? '0'+(date.getMonth()+1) : date.getMonth()+1) + '-';
        var D = date.getDate() + ' ';
        var h = date.getHours() + ':';
        var m = date.getMinutes() + ':';
        var s = date.getSeconds();
        return Y+M+D+h+m+s;
    }


</script>


{/block}
