{include file="public/header"/}
  <style>.container{height:calc(100vh - 44px);background:#fff;-webkit-box-sizing:border-box;box-sizing:border-box;padding:0 15px 15px;font-size:14px}.container .items{border-radius:10px;padding:15px 5px 1px 15px}.container .items .item:after{content:"";width:100%;height:1px;background:#f2f2f2;position:absolute;bottom:0;left:0}.container .items .item{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;height:60px;line-height:60px;margin-bottom:10px;white-space:nowrap;-webkit-box-shadow:0 0 0 0 #eeeff2;box-shadow:0 0 0 0 #eeeff2;border-bottom:1px solid #eeeff2}.container .items .item .label{width:225px;font-size:15px;font-family:PingFangSC-Medium,PingFang SC;font-weight:500;color:#334360}.container .items .item .input{width:calc(100% - 60px - 20px);text-align:right;padding-right:10px;-webkit-box-sizing:border-box;box-sizing:border-box;font-size:15px;font-family:PingFangSC-Medium,PingFang SC;font-weight:500;color:#ffb702}.container .items .item .iconfont{color:#939bab}</style>


<body>
  <uni-app class="uni-app--maxwidth">
    <uni-page data-page="pages/safe/index">
      <!---->
      <!---->
      <uni-page-wrapper>
        <uni-page-body>
          <div class="container">
            <div class="top-page"
              style="height: 44px; background: linear-gradient(to right, rgb(255, 255, 255), rgb(255, 255, 255));">
              <div class="apex"
                style="height: 44px; line-height: 44px; background: linear-gradient(to right, rgb(255, 255, 255), rgb(255, 255, 255)); color: rgb(0, 0, 0); position: fixed;">
                <a href="javascript:history.go(-1)" class="left">
                  <uni-text class="iconfont icon-fanhui1"
                    style="font-size: 16px; color: rgb(0, 0, 0);"><span></span></uni-text>
                </a>
                <div class="center" style="font-size: 17px;">Security management</div>
                <div class="right"></div>
              </div>
              <div class="placeholder" style="height: 44px; line-height: 44px;"></div>
            </div>
            <div class="items">
              <a href="{:Url('account/password')}" class="item">
                <div class="label"> login password</div>
                <div class="input">protecting</div>
                <uni-text class="iconfont icon-qianjin"><span></span></uni-text>
              </a>
              <a href="{:Url('account/password_pay')}" class="item">
                <div class="label">payment password</div>
                <div class="input">protecting</div>
                <uni-text class="iconfont icon-qianjin"><span></span></uni-text>
              </a>
              {include file="public/footer"/}
            </div>
          </div>
        </uni-page-body>
      </uni-page-wrapper>
    </uni-page>
  </uni-app>
</body>
</html>
